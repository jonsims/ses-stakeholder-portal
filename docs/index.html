<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SES Stakeholder Summit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f8f9fa;
      color: #1a1a1a;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gate {
      text-align: center;
      padding: 32px 24px;
      max-width: 360px;
    }
    .gate h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .gate p { font-size: 14px; color: #6b7280; margin-bottom: 24px; }
    .gate input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      text-align: center;
      margin-bottom: 12px;
    }
    .gate input:focus { outline: none; border-color: #0369a1; box-shadow: 0 0 0 3px rgba(3,105,161,0.12); }
    .gate button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }
    .gate button:hover { background: #374151; }
    .error { color: #dc2626; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <div class="gate">
    <h1>SES Stakeholder Summit</h1>
    <p>Socioecological Systems — Babson College</p>
    <input type="password" id="pw" placeholder="Enter access code" autofocus>
    <button onclick="check()">Enter</button>
    <div class="error" id="err">Incorrect code. Try again.</div>
  </div>
  <script>
    // Simple client-side gate — not real security, just keeps out casual visitors
    var H = 'a3c2f8'; // hash fragment used as key check
    function check() {
      var v = document.getElementById('pw').value.trim().toLowerCase();
      if (v === 'ses2000' || v === 'ses 2000') {
        sessionStorage.setItem('ses-auth', '1');
        window.location.href = 'home.html';
      } else {
        document.getElementById('err').style.display = 'block';
      }
    }
    document.getElementById('pw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') check();
    });
    // If already authenticated this session, skip gate
    if (sessionStorage.getItem('ses-auth') === '1') {
      window.location.href = 'home.html';
    }
  </script>
</body>
</html>
