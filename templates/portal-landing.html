<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="css/shared.css">
</head>
<body>
  <div class="landing">
    <div class="landing__header">
      <h1 class="landing__title">{{ site.title }}</h1>
      <p class="landing__subtitle">{{ site.description }}</p>
    </div>

    <div class="category-grid">
      {% for cat in categories %}
      <a href="{{ cat.id }}/" class="category-card" style="--cat-color: {{ cat.color }}; --cat-light: {{ cat.color_light }}">
        <div class="category-card__icon">{{ cat.icon }}</div>
        <div class="category-card__name">{{ cat.name }}</div>
        <div class="category-card__tagline">{{ cat.tagline }}</div>
        <div class="category-card__count">{{ cat.stakeholders|length }} stakeholders</div>
      </a>
      {% endfor %}
    </div>

    <div class="landing__footer">
      {{ site.subtitle }}
    </div>
  </div>
</body>
</html>
